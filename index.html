<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MotoTap — Свеча зажигания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        /* Контейнер с фоном на весь экран */
        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('IMG_0881.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Затемнение для лучшей видимости свечи (опционально) */
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        /* Зона тапа — свеча зажигания */
        .spark-plug-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
        }

        .spark-plug {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.07s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.5));
        }

        /* Анимация нажатия */
        .spark-plug:active {
            transform: scale(0.92);
        }

        /* Контейнер для осколков */
        .debris-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        /* Отдельный осколок */
        .debris {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: flyAway 0.6s ease-out forwards;
            z-index: 1001;
        }

        @keyframes flyAway {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx, 100px), var(--dy, -100px)) scale(0.3) rotate(720deg);
                opacity: 0;
            }
        }

        /* Счётчик (пока просто для отладки, можно убрать потом) */
        .counter-debug {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffaa33;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 1rem;
            z-index: 20;
            font-weight: bold;
            pointer-events: none;
        }

        /* Адаптация под разные экраны */
        @media (max-width: 600px) {
            .spark-plug-wrapper {
                max-width: 220px;
            }
            .debris {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="spark-plug-wrapper" id="tapZone">
        <img src="IMG_0884-photo.png" alt="Свеча зажигания" class="spark-plug" id="sparkPlug">
    </div>
    <div class="debris-container" id="debrisContainer"></div>
    <div class="counter-debug" id="tapCounter">Тапов: 0</div>
</div>

<script>
    // Счётчик тапов (пока для отладки, потом замените на сбор монет)
    let tapCount = 0;
    const tapCounterElement = document.getElementById('tapCounter');
    
    // Элементы
    const tapZone = document.getElementById('tapZone');
    const sparkPlug = document.getElementById('sparkPlug');
    const debrisContainer = document.getElementById('debrisContainer');
    
    // Функция обновления счётчика
    function updateCounter() {
        tapCounterElement.innerText = `Тапов: ${tapCount}`;
    }
    
    // Функция создания осколков (кусочков свечи)
    function createDebris(x, y) {
        // Разные символы для осколков (можно заменить на маленькие чёрные кусочки)
        const debrisTypes = ['⚡', '🔩', '⚙️', '💥', '▪️', '▫️', '•', '⦿'];
        const debrisCount = Math.floor(Math.random() * 5) + 4; // 4-8 осколков
        
        for (let i = 0; i < debrisCount; i++) {
            const debris = document.createElement('div');
            debris.className = 'debris';
            
            // Случайный символ осколка
            const randomType = debrisTypes[Math.floor(Math.random() * debrisTypes.length)];
            debris.innerText = randomType;
            
            // Случайное направление разлёта (в разные стороны)
            const angle = Math.random() * Math.PI * 2;
            const distance = 60 + Math.random() * 100;
            const dx = Math.cos(angle) * distance;
            const dy = Math.sin(angle) * distance - 30; // чуть вверх для красоты
            
            // Устанавливаем CSS переменные для анимации
            debris.style.setProperty('--dx', dx + 'px');
            debris.style.setProperty('--dy', dy + 'px');
            
            // Позиция осколка — в месте тапа (с небольшим разбросом)
            debris.style.left = (x - 15 + (Math.random() - 0.5) * 30) + 'px';
            debris.style.top = (y - 15 + (Math.random() - 0.5) * 30) + 'px';
            
            // Случайный размер
            const size = 1 + Math.random() * 0.8;
            debris.style.fontSize = (1.2 * size) + 'rem';
            
            debrisContainer.appendChild(debris);
            
            // Удаляем осколок после анимации
            setTimeout(() => {
                debris.remove();
            }, 600);
        }
    }
    
    // Анимация нажатия (уменьшение и возврат)
    function animateTap() {
        sparkPlug.style.transform = 'scale(0.92)';
        setTimeout(() => {
            sparkPlug.style.transform = 'scale(1)';
        }, 100);
        
        // Вибрация на телефонах
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(20);
        }
    }
    
    // Обработчик тапа
    function onTap(event) {
        // Увеличиваем счётчик
        tapCount++;
        updateCounter();
        
        // Анимация уменьшения свечи
        animateTap();
        
        // Получаем координаты для осколков
        let clientX, clientY;
        if (event.touches) {
            // Для тач-событий (телефон)
            clientX = event.touches[0].clientX;
            clientY = event.touches[0].clientY;
            event.preventDefault();
        } else {
            // Для мыши (ПК)
            clientX = event.clientX;
            clientY = event.clientY;
        }
        
        // Создаём летящие осколки
        createDebris(clientX, clientY);
        
        // Дополнительный визуальный фидбек — всплывающая искра
        createSpark(clientX, clientY);
    }
    
    // Эффект искры при тапе
    function createSpark(x, y) {
        const spark = document.createElement('div');
        spark.innerText = '💥';
        spark.style.position = 'fixed';
        spark.style.left = (x - 12) + 'px';
        spark.style.top = (y - 12) + 'px';
        spark.style.fontSize = '1.8rem';
        spark.style.pointerEvents = 'none';
        spark.style.zIndex = '1002';
        spark.style.opacity = '1';
        spark.style.transition = 'all 0.3s ease-out';
        document.body.appendChild(spark);
        
        setTimeout(() => {
            spark.style.transform = 'translateY(-40px)';
            spark.style.opacity = '0';
        }, 10);
        
        setTimeout(() => {
            spark.remove();
        }, 300);
    }
    
    // Привязываем события
    tapZone.addEventListener('click', onTap);
    tapZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const fakeEvent = { touches: [touch], clientX: touch.clientX, clientY: touch.clientY };
        onTap(fakeEvent);
    });
    
    // Проверка загрузки картинок
    const checkImages = () => {
        const bgImage = new Image();
        bgImage.src = 'IMG_0881.png';
        bgImage.onerror = () => console.warn('⚠️ Фон не загрузился. Проверь имя файла: IMG_0881.png');
        
        const plugImage = new Image();
        plugImage.src = 'IMG_0884-photo.png';
        plugImage.onerror = () => console.warn('⚠️ Свеча не загрузилась. Проверь имя файла: IMG_0884-photo.png');
        plugImage.onload = () => console.log('✅ Свеча загружена!');
    };
    
    checkImages();
    
    console.log('🎮 Игра готова! Тапай по свече 🔥');
</script>
</body>
</html>
