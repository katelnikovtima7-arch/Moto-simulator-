<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MotoTap — Свеча зажигания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
            position: fixed;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('IMG_0881.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        /* === ВЕРХНЯЯ ПАНЕЛЬ (длинный узкий прямоугольник) === */
        .stats-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            z-index: 20;
            border: 1px solid rgba(255, 180, 60, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .stat-item {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffaa66;
            font-weight: bold;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFD966;
            text-shadow: 0 1px 0 #7a5c00;
            line-height: 1;
        }

        /* Разделители между блоками */
        .stat-divider {
            width: 1px;
            height: 35px;
            background: rgba(255, 180, 60, 0.3);
        }

        /* Центральный контент (сфера + свеча) */
        .content-center {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateY(40%);
        }

        .sphere {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, 
                rgba(30, 30, 45, 0.55) 0%,
                rgba(25, 25, 40, 0.65) 30%,
                rgba(20, 20, 35, 0.85) 60%,
                rgba(15, 15, 28, 0.95) 85%,
                rgba(10, 10, 20, 1) 100%);
            box-shadow: 
                0 5px 20px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(120, 100, 80, 0.4);
            pointer-events: none;
        }

        .sphere::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(200, 170, 120, 0.08) 0%,
                transparent 70%);
            pointer-events: none;
        }

        .spark-plug-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
            transition: transform 0.07s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .spark-plug {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.5));
            pointer-events: none;
        }

        .spark-plug-wrapper.tap-active {
            transform: scale(0.94);
        }

        .debris-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
            overflow: hidden;
        }

        .debris {
            position: absolute;
            width: 7px;
            height: 7px;
            background: white;
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0.95;
            animation: fragmentFly 0.6s ease-out forwards;
        }

        .debris.rounded {
            border-radius: 50%;
        }
        .debris.shard {
            border-radius: 1px;
            transform: rotate(45deg);
            width: 5px;
            height: 10px;
        }
        .debris.tiny {
            width: 4px;
            height: 4px;
        }

        @keyframes fragmentFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx, 60px), var(--dy, -70px)) scale(0.2) rotate(200deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .sphere {
                width: 260px;
                height: 260px;
            }
            .spark-plug-wrapper {
                max-width: 240px;
            }
            .content-center {
                transform: translateY(43%);
            }
            .stat-value {
                font-size: 1rem;
            }
            .stat-label {
                font-size: 0.6rem;
            }
            .stats-panel {
                padding: 8px 15px;
                top: 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- ВЕРХНЯЯ ПАНЕЛЬ СТАТИСТИКИ -->
    <div class="stats-panel">
        <div class="stat-item">
            <div class="stat-label">УРОВЕНЬ</div>
            <div class="stat-value" id="levelValue">1</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-label">ДЕТАЛЕЙ</div>
            <div class="stat-value" id="partsValue">0</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-label">ДОХОД/ЧАС</div>
            <div class="stat-value" id="incomeValue">0</div>
        </div>
    </div>

    <div class="content-center">
        <div class="sphere"></div>
        <div class="spark-plug-wrapper" id="tapZone">
            <img src="IMG_0884-photo.png" alt="Свеча зажигания" class="spark-plug">
        </div>
    </div>
    <div class="debris-container" id="debrisContainer"></div>
</div>

<script>
    const tapZone = document.getElementById('tapZone');
    const debrisContainer = document.getElementById('debrisContainer');
    
    // Игровые переменные
    let parts = 0;           // накоплено деталей
    let level = 1;           // уровень (будет влиять на доход)
    let tapPower = 1;        // деталей за один тап (будет расти с уровнем)
    
    // Доход в час (виртуальный)
    let incomePerSecond = 0;  // пассивный доход (пока 0, потом добавим)
    
    // Элементы UI
    const levelValueEl = document.getElementById('levelValue');
    const partsValueEl = document.getElementById('partsValue');
    const incomeValueEl = document.getElementById('incomeValue');
    
    // Функция обновления UI
    function updateUI() {
        partsValueEl.innerText = Math.floor(parts);
        levelValueEl.innerText = level;
        // Доход в час = доход в секунду * 3600
        const incomePerHour = Math.floor(incomePerSecond * 3600);
        incomeValueEl.innerText = incomePerHour.toLocaleString();
    }
    
    // Функция добавления деталей
    function addParts(amount) {
        parts += amount;
        updateUI();
        checkLevelUp(); // проверяем, не пора ли повысить уровень
    }
    
    // Проверка повышения уровня (простая формула)
    function checkLevelUp() {
        const neededForNextLevel = level * 100; // для 1 уровня нужно 100 деталей, для 2 - 200 и т.д.
        if (parts >= neededForNextLevel) {
            level++;
            // При повышении уровня увеличиваем силу тапа
            tapPower = 1 + (level - 1) * 0.5; // +0.5 за каждый уровень
            tapPower = Math.floor(tapPower);
            updateUI();
            showFloatingText(`⬆️ УРОВЕНЬ ${level}!`, '#FFD966');
        }
    }
    
    // Всплывающее сообщение
    function showFloatingText(text, color) {
        const div = document.createElement('div');
        div.innerText = text;
        div.style.position = 'fixed';
        div.style.bottom = '40%';
        div.style.left = '50%';
        div.style.transform = 'translateX(-50%)';
        div.style.backgroundColor = 'rgba(0,0,0,0.8)';
        div.style.color = color;
        div.style.padding = '8px 20px';
        div.style.borderRadius = '40px';
        div.style.fontSize = '1rem';
        div.style.fontWeight = 'bold';
        div.style.zIndex = '9999';
        div.style.whiteSpace = 'nowrap';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1200);
    }
    
    // Осколки
    function createDebris(x, y) {
        const debrisCount = Math.floor(Math.random() * 3) + 1;
        
        for (let i = 0; i < debrisCount; i++) {
            const debris = document.createElement('div');
            debris.classList.add('debris');
            
            const shape = Math.random();
            if (shape < 0.33) debris.classList.add('rounded');
            else if (shape < 0.66) debris.classList.add('shard');
            else debris.classList.add('tiny');
            
            const angle = (Math.random() - 0.5) * Math.PI * 1.5 - Math.PI / 3;
            const speed = 55 + Math.random() * 70;
            const dx = Math.cos(angle) * speed * (Math.random() * 0.8 + 0.6);
            const dy = Math.sin(angle) * speed * 0.9 - 40;
            
            debris.style.setProperty('--dx', dx + 'px');
            debris.style.setProperty('--dy', dy + 'px');
            debris.style.left = (x - 7 + (Math.random() - 0.5) * 26) + 'px';
            debris.style.top = (y - 7 + (Math.random() - 0.5) * 22) + 'px';
            
            const brightness = 200 + Math.random() * 55;
            debris.style.backgroundColor = `rgb(${brightness}, ${brightness - 15}, 230)`;
            
            debrisContainer.appendChild(debris);
            setTimeout(() => debris.remove(), 600);
        }
    }
    
    // Анимация нажатия
    function animateTap() {
        tapZone.classList.add('tap-active');
        setTimeout(() => {
            tapZone.classList.remove('tap-active');
        }, 100);
        if (window.navigator && window.navigator.vibrate) navigator.vibrate(15);
    }
    
    // Обработка тапа
    function handleTap(clientX, clientY) {
        animateTap();
        addParts(tapPower);
        createDebris(clientX, clientY);
        
        // Искра
        const spark = document.createElement('div');
        spark.innerHTML = '⚡';
        spark.style.position = 'fixed';
        spark.style.left = (clientX - 8) + 'px';
        spark.style.top = (clientY - 8) + 'px';
        spark.style.fontSize = '0.9rem';
        spark.style.opacity = '0.5';
        spark.style.pointerEvents = 'none';
        spark.style.zIndex = '1000';
        spark.style.transition = 'all 0.2s ease';
        document.body.appendChild(spark);
        setTimeout(() => { spark.style.transform = 'translateY(-15px)'; spark.style.opacity = '0'; }, 10);
        setTimeout(() => spark.remove(), 200);
    }
    
    // События тапа
    tapZone.addEventListener('click', (e) => {
        handleTap(e.clientX, e.clientY);
    });
    
    tapZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touches = e.touches;
        for (let i = 0; i < touches.length; i++) {
            const touch = touches[i];
            handleTap(touch.clientX, touch.clientY);
        }
    });
    
    // Сохранение/загрузка
    function saveGame() {
        const save = { parts, level, tapPower, incomePerSecond };
        localStorage.setItem('MotoTapSave', JSON.stringify(save));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('MotoTapSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                parts = data.parts || 0;
                level = data.level || 1;
                tapPower = data.tapPower || 1;
                incomePerSecond = data.incomePerSecond || 0;
                updateUI();
            } catch(e) {}
        }
        updateUI();
    }
    
    // Автосохранение каждые 5 секунд
    setInterval(() => saveGame(), 5000);
    
    // Пассивный доход (пока 0, но система готова)
    setInterval(() => {
        if (incomePerSecond > 0) {
            addParts(incomePerSecond);
        }
    }, 1000);
    
    // Загружаем игру
    loadGame();
    
    console.log('✅ Верхняя панель добавлена: уровень, детали, доход/час');
</script>
</body>
</html>
