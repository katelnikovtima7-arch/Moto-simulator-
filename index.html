<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MotoTap — Гараж</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: #000;
            overflow-x: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
        }

        /* Контейнер с фоном */
        .game-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-image: url('copy_4432001B-F045-479C-A4B1-7135B9218A73.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Затемнение сверху для читаемости счётчика (опционально) */
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* Всё поверх фона */
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 30px 20px 50px;
        }

        /* Счётчик деталей */
        .counter-area {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 80px;
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.4);
            margin-top: 20px;
        }
        .gear-icon {
            font-size: 2.8rem;
            filter: drop-shadow(0 2px 4px black);
        }
        .counter-number {
            font-size: 3rem;
            font-weight: bold;
            color: #FFD966;
            text-shadow: 0 2px 0 #7a5c00;
            letter-spacing: 2px;
            line-height: 1;
        }
        .counter-label {
            font-size: 0.8rem;
            color: #ddd;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Мотоцикл (зона тапа) */
        .bike-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 20px 0;
        }
        .bike-tap {
            cursor: pointer;
            transition: transform 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: inline-block;
            max-width: 85%;
            width: auto;
        }
        .bike-tap:active {
            transform: scale(0.92);
        }
        .bike-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.6));
            pointer-events: none; /* чтобы клики проходили через картинку к родителю */
        }

        /* Подсказка и место для будущих кнопок (магазин и т.д.) */
        .bottom-panel {
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 16px 20px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,180,50,0.5);
        }
        .future-button {
            background: #f0a500;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1f2a0e;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 8px black;
            opacity: 0.8;
            cursor: default; /* пока не добавлен функционал, просто визуально */
        }
        .future-button:active {
            transform: scale(0.97);
        }
        .info-text {
            font-size: 0.7rem;
            color: #ffcc88;
            text-align: center;
        }

        @media (max-width: 600px) {
            .counter-number { font-size: 2.2rem; }
            .gear-icon { font-size: 2rem; }
            .bike-image { max-width: 280px; }
            .future-button { font-size: 0.9rem; padding: 10px 12px; }
            .counter-area { padding: 8px 20px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="content">
        <!-- Верхняя часть: счётчик деталей -->
        <div class="counter-area">
            <span class="gear-icon">⚙️</span>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="counter-number" id="partsCounter">0</div>
                <div class="counter-label">деталей</div>
            </div>
        </div>

        <!-- Мотоцикл - зона для тапа -->
        <div class="bike-wrapper">
            <div class="bike-tap" id="tapZone">
                <img src="IMG_0877-no-bg-preview-carve.photos.png" alt="Мотоцикл" class="bike-image" id="bikeImg">
            </div>
        </div>

        <!-- Нижняя панель (здесь скоро появится магазин, награды и т.д.) -->
        <div class="bottom-panel">
            <div class="future-button">🏪 МАГАЗИН (скоро)</div>
            <div class="future-button">🏆 НАГРАДЫ (скоро)</div>
            <div class="info-text">⚡ тапай по байку → получай детали</div>
        </div>
    </div>
</div>

<script>
    // ----- ИГРОВАЯ ЛОГИКА -----
    let parts = 0;  // количество собранных деталей (⚙️)
    
    // Элементы на странице
    const partsCounterElement = document.getElementById('partsCounter');
    const tapZone = document.getElementById('tapZone');
    const bikeImage = document.getElementById('bikeImg');
    
    // Функция обновления счётчика на экране
    function updateUI() {
        partsCounterElement.innerText = Math.floor(parts);
        saveGame();
    }
    
    // Добавление деталей (за тап)
    function addParts(amount) {
        parts += amount;
        updateUI();
    }
    
    // Анимация нажатия (уменьшение + виброотклик на телефонах где поддерживается)
    function animateTap() {
        // Добавляем класс активной анимации
        tapZone.style.transform = 'scale(0.92)';
        setTimeout(() => {
            tapZone.style.transform = 'scale(1)';
        }, 100);
        
        // Лёгкая вибрация (если устройство поддерживает и не в настройках отключено)
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(20);
        }
    }
    
    // Обработчик тапа/клика
    function onTap(event) {
        // Анимация
        animateTap();
        // Даём 1 деталь за тап
        addParts(1);
        
        // Небольшой визуальный фидбек: можно добавить "всплывающую" надпись +1
        createFloatingNumber(event.clientX, event.clientY);
    }
    
    // Создаём всплывающую цифру +1 в месте клика (для кайфа)
    function createFloatingNumber(x, y) {
        const floating = document.createElement('div');
        floating.innerText = '+1 ⚙️';
        floating.style.position = 'fixed';
        floating.style.left = (x - 20) + 'px';
        floating.style.top = (y - 30) + 'px';
        floating.style.color = '#FFD966';
        floating.style.fontWeight = 'bold';
        floating.style.fontSize = '1.8rem';
        floating.style.textShadow = '1px 1px 0 black';
        floating.style.pointerEvents = 'none';
        floating.style.zIndex = '9999';
        floating.style.opacity = '1';
        floating.style.transition = 'all 0.5s ease-out';
        document.body.appendChild(floating);
        
        // Анимация улетания вверх и исчезновения
        setTimeout(() => {
            floating.style.transform = 'translateY(-60px)';
            floating.style.opacity = '0';
        }, 20);
        
        setTimeout(() => {
            floating.remove();
        }, 600);
    }
    
    // СОХРАНЕНИЕ ПРОГРЕССА (localStorage)
    function saveGame() {
        const saveData = {
            parts: parts
        };
        localStorage.setItem('MotoTapSave', JSON.stringify(saveData));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('MotoTapSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.parts !== undefined) parts = data.parts;
                updateUI();
            } catch(e) { console.warn('ошибка загрузки'); }
        }
        updateUI();
    }
    
    // Привязываем обработчики событий (для мышки и для тач-экрана)
    tapZone.addEventListener('click', onTap);
    // Для лучшего отклика на тач-устройствах:
    tapZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        onTap(touch);
    });
    
    // Загрузка сохранения при старте
    loadGame();
    
    // Небольшая подстраховка: если картинка мотоцикла не загрузилась, ничего страшного
    console.log('Игра готова! Тапай по мотоциклу и собирай детали ⚙️');
</script>
</body>
</html>
