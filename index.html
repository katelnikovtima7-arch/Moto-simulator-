<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MotoTap — Свеча зажигания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
            position: fixed;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('IMG_0881.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Затемнение для контраста */
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            pointer-events: none;
        }

        /* === НОВЫЙ КУПОЛ — с текстурой и энергетикой === */
        .dome {
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.08) 0%, 
                rgba(180, 220, 255, 0.05) 30%,
                rgba(80, 120, 180, 0.08) 70%,
                rgba(40, 60, 100, 0.15) 100%);
            box-shadow: 
                0 0 40px rgba(100, 180, 255, 0.2),
                inset 0 0 25px rgba(150, 200, 255, 0.25),
                0 0 5px rgba(200, 220, 255, 0.5);
            border: 1px solid rgba(160, 200, 255, 0.5);
            backdrop-filter: blur(3px);
            pointer-events: none;
            z-index: 1;
            
            /* Медленная пульсация для живости */
            animation: gentlePulse 3s infinite ease-in-out;
        }
        
        /* Энергетические разряды по краям купола (псевдоэлементы) */
        .dome::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 220, 255, 0.15) 0%, transparent 70%);
            filter: blur(12px);
            opacity: 0.6;
            pointer-events: none;
        }
        
        .dome::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90%;
            height: 90%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: repeating-radial-gradient(circle at 20% 30%, 
                rgba(255, 255, 255, 0.08) 0px, 
                rgba(255, 255, 255, 0.02) 2px,
                transparent 4px,
                transparent 8px);
            pointer-events: none;
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); opacity: 0.7; box-shadow: 0 0 30px rgba(100, 180, 255, 0.2); }
            50% { transform: scale(1.02); opacity: 0.85; box-shadow: 0 0 50px rgba(120, 200, 255, 0.35); }
            100% { transform: scale(1); opacity: 0.7; box-shadow: 0 0 30px rgba(100, 180, 255, 0.2); }
        }

        /* Зона тапа — свеча */
        .spark-plug-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 80%;
            max-width: 260px;
        }

        .spark-plug {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.07s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.5));
            position: relative;
            z-index: 2;
        }

        .spark-plug:active {
            transform: scale(0.92);
        }

        /* Контейнер осколков */
        .debris-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
            overflow: hidden;
        }

        /* Белые неровные осколки */
        .debris {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 2px;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.9);
            pointer-events: none;
            opacity: 0.95;
            animation: fragmentFly 0.65s ease-out forwards;
        }

        .debris.rounded {
            border-radius: 50%;
        }
        .debris.shard {
            border-radius: 1px;
            transform: rotate(45deg);
            width: 6px;
            height: 12px;
        }
        .debris.tiny {
            width: 5px;
            height: 5px;
        }

        @keyframes fragmentFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx, 60px), var(--dy, -80px)) scale(0.15) rotate(240deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .dome {
                width: 260px;
                height: 260px;
            }
            .spark-plug-wrapper {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- КУПОЛ с текстурой и мерцанием -->
    <div class="dome"></div>

    <!-- СВЕЧА -->
    <div class="spark-plug-wrapper" id="tapZone">
        <img src="IMG_0884-photo.png" alt="Свеча зажигания" class="spark-plug" id="sparkPlug">
    </div>

    <div class="debris-container" id="debrisContainer"></div>
</div>

<script>
    const tapZone = document.getElementById('tapZone');
    const sparkPlug = document.getElementById('sparkPlug');
    const debrisContainer = document.getElementById('debrisContainer');
    
    function createDebris(x, y) {
        const debrisCount = Math.floor(Math.random() * 3) + 1;
        
        for (let i = 0; i < debrisCount; i++) {
            const debris = document.createElement('div');
            debris.classList.add('debris');
            
            const shape = Math.random();
            if (shape < 0.33) debris.classList.add('rounded');
            else if (shape < 0.66) debris.classList.add('shard');
            else debris.classList.add('tiny');
            
            const angle = (Math.random() - 0.5) * Math.PI * 1.5 - Math.PI / 3;
            const speed = 55 + Math.random() * 75;
            const dx = Math.cos(angle) * speed * (Math.random() * 0.8 + 0.6);
            const dy = Math.sin(angle) * speed * 0.9 - 40;
            
            debris.style.setProperty('--dx', dx + 'px');
            debris.style.setProperty('--dy', dy + 'px');
            debris.style.left = (x - 8 + (Math.random() - 0.5) * 28) + 'px';
            debris.style.top = (y - 8 + (Math.random() - 0.5) * 24) + 'px';
            
            const brightness = 200 + Math.random() * 55;
            debris.style.backgroundColor = `rgb(${brightness}, ${brightness - 15}, 230)`;
            
            debrisContainer.appendChild(debris);
            setTimeout(() => debris.remove(), 650);
        }
    }
    
    function animateTap() {
        sparkPlug.style.transform = 'scale(0.92)';
        setTimeout(() => {
            sparkPlug.style.transform = 'scale(1)';
        }, 100);
        if (window.navigator && window.navigator.vibrate) navigator.vibrate(20);
    }
    
    function onTap(event) {
        animateTap();
        
        let clientX, clientY;
        if (event.touches) {
            clientX = event.touches[0].clientX;
            clientY = event.touches[0].clientY;
            event.preventDefault();
        } else {
            clientX = event.clientX;
            clientY = event.clientY;
        }
        
        createDebris(clientX, clientY);
        
        // маленькая искра для настроения
        const spark = document.createElement('div');
        spark.innerHTML = '✨';
        spark.style.position = 'fixed';
        spark.style.left = (clientX - 8) + 'px';
        spark.style.top = (clientY - 8) + 'px';
        spark.style.fontSize = '1rem';
        spark.style.opacity = '0.6';
        spark.style.pointerEvents = 'none';
        spark.style.zIndex = '1000';
        spark.style.transition = 'all 0.2s ease';
        document.body.appendChild(spark);
        setTimeout(() => { spark.style.transform = 'translateY(-15px)'; spark.style.opacity = '0'; }, 10);
        setTimeout(() => spark.remove(), 250);
    }
    
    tapZone.addEventListener('click', onTap);
    tapZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        onTap(touch);
    });
    
    console.log('✅ Купол обновлён — теперь с душой');
</script>
</body>
</html>
