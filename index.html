<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MotoTap — Свеча зажигания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
            position: fixed;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* Контейнер с фоном на весь экран */
        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('IMG_0881.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Лёгкое затемнение, чтобы свеча читалась лучше */
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        /* === КУПОЛ (круглая обводка со свечением) === */
        .dome {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 220, 255, 0.08) 0%, rgba(100, 160, 220, 0.03) 60%, transparent 90%);
            box-shadow: 
                0 0 30px rgba(120, 180, 255, 0.15),
                inset 0 0 15px rgba(150, 200, 255, 0.1);
            border: 1px solid rgba(180, 220, 255, 0.25);
            backdrop-filter: blur(2px);
            pointer-events: none;
            z-index: 1;
            transition: all 0.2s ease;
        }

        /* Зона тапа — свеча зажигания (поверх купола) */
        .spark-plug-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 80%;
            max-width: 260px;
        }

        .spark-plug {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.07s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4));
            position: relative;
            z-index: 2;
        }

        /* Анимация нажатия */
        .spark-plug:active {
            transform: scale(0.92);
        }

        /* Контейнер для осколков */
        .debris-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
            overflow: hidden;
        }

        /* Стиль осколка — белый неровный кусочек */
        .debris {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 2px;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0.95;
            animation: fragmentFly 0.65s ease-out forwards;
        }

        /* Разные формы осколков (случайные) */
        .debris.rounded {
            border-radius: 50%;
        }
        .debris.shard {
            border-radius: 1px;
            transform: rotate(45deg);
            width: 6px;
            height: 12px;
        }
        .debris.tiny {
            width: 5px;
            height: 5px;
        }

        @keyframes fragmentFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx, 60px), var(--dy, -80px)) scale(0.2) rotate(200deg);
                opacity: 0;
            }
        }

        /* Адаптация под маленькие экраны */
        @media (max-width: 600px) {
            .dome {
                width: 240px;
                height: 240px;
            }
            .spark-plug-wrapper {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- КУПОЛ - круглая обводка со свечением -->
    <div class="dome"></div>

    <!-- СВЕЧА -->
    <div class="spark-plug-wrapper" id="tapZone">
        <img src="IMG_0884-photo.png" alt="Свеча зажигания" class="spark-plug" id="sparkPlug">
    </div>

    <!-- контейнер для летящих кусочков -->
    <div class="debris-container" id="debrisContainer"></div>
</div>

<script>
    const tapZone = document.getElementById('tapZone');
    const sparkPlug = document.getElementById('sparkPlug');
    const debrisContainer = document.getElementById('debrisContainer');
    
    // Функция создания белого осколка
    function createDebris(x, y) {
        // Сколько кусочков: 1, 2 или 3
        const debrisCount = Math.floor(Math.random() * 3) + 1;
        
        for (let i = 0; i < debrisCount; i++) {
            const debris = document.createElement('div');
            debris.classList.add('debris');
            
            // Случайная форма осколка
            const shape = Math.random();
            if (shape < 0.33) {
                debris.classList.add('rounded');
            } else if (shape < 0.66) {
                debris.classList.add('shard');
            } else {
                debris.classList.add('tiny');
            }
            
            // Случайное направление: сначала вверх, потом разлет в стороны и вниз
            const angle = (Math.random() - 0.5) * Math.PI * 1.5 - Math.PI / 3; // угол от -120 до +60 градусов (вверх и в стороны)
            const speed = 60 + Math.random() * 70;
            const dx = Math.cos(angle) * speed * (Math.random() * 0.8 + 0.6);
            const dy = Math.sin(angle) * speed * 0.9 - 40; // взлетает вверх
            
            debris.style.setProperty('--dx', dx + 'px');
            debris.style.setProperty('--dy', dy + 'px');
            
            // Позиция осколка: в месте тапа с разбросом
            debris.style.left = (x - 8 + (Math.random() - 0.5) * 28) + 'px';
            debris.style.top = (y - 8 + (Math.random() - 0.5) * 24) + 'px';
            
            // Случайный оттенок белого
            const brightness = 200 + Math.random() * 55;
            debris.style.backgroundColor = `rgb(${brightness}, ${brightness - 20}, 220)`;
            
            debrisContainer.appendChild(debris);
            
            // Удалить после анимации
            setTimeout(() => debris.remove(), 650);
        }
    }
    
    // Анимация уменьшения свечи
    function animateTap() {
        sparkPlug.style.transform = 'scale(0.92)';
        setTimeout(() => {
            sparkPlug.style.transform = 'scale(1)';
        }, 100);
        
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(20);
        }
    }
    
    // Обработчик тапа
    function onTap(event) {
        animateTap();
        
        let clientX, clientY;
        if (event.touches) {
            clientX = event.touches[0].clientX;
            clientY = event.touches[0].clientY;
            event.preventDefault();
        } else {
            clientX = event.clientX;
            clientY = event.clientY;
        }
        
        // Вылетают 1-3 белых кусочка
        createDebris(clientX, clientY);
        
        // Лёгкий дополнительный эффект — микро-искра для красоты
        createSparkle(clientX, clientY);
    }
    
    // Микро-искра (чисто визуал)
    function createSparkle(x, y) {
        const spark = document.createElement('div');
        spark.innerHTML = '⚡';
        spark.style.position = 'fixed';
        spark.style.left = (x - 10) + 'px';
        spark.style.top = (y - 10) + 'px';
        spark.style.fontSize = '1rem';
        spark.style.opacity = '0.7';
        spark.style.pointerEvents = 'none';
        spark.style.zIndex = '1000';
        spark.style.transition = 'transform 0.2s ease-out, opacity 0.3s';
        document.body.appendChild(spark);
        
        setTimeout(() => {
            spark.style.transform = 'translateY(-20px)';
            spark.style.opacity = '0';
        }, 10);
        setTimeout(() => spark.remove(), 250);
    }
    
    // События
    tapZone.addEventListener('click', onTap);
    tapZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        onTap(touch);
    });
    
    // Проверка загрузки картинок (тихо)
    const bgTest = new Image();
    bgTest.src = 'IMG_0881.png';
    const plugTest = new Image();
    plugTest.src = 'IMG_0884-photo.png';
    
    console.log('🏍️ Игра с куполом и белыми осколками запущена');
</script>
</body>
</html>
