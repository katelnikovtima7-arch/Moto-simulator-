<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MotoTap — Свеча зажигания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
            position: fixed;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('IMG_0881.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        .stats-panel {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            z-index: 20;
            border: 1px solid rgba(255, 180, 60, 0.6);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .stat-item {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffaa66;
            font-weight: bold;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #FFD966;
            text-shadow: 0 2px 0 #7a5c00;
            line-height: 1;
        }

        .stat-divider {
            width: 2px;
            height: 45px;
            background: rgba(255, 180, 60, 0.4);
        }

        .daily-bonus-btn {
            position: absolute;
            top: 130px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 200, 80, 0.6);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 25;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .daily-bonus-btn:active {
            transform: scale(0.95);
        }

        .daily-bonus-icon {
            font-size: 1.5rem;
        }

        .daily-bonus-text {
            font-size: 0.75rem;
            font-weight: bold;
            color: #FFD966;
        }

        .daily-bonus-timer {
            font-size: 0.7rem;
            color: #aaa;
        }

        .daily-bonus-btn.disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        .floating-message-container {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            pointer-events: none;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .floating-message {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #FFD966;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 200, 80, 0.5);
            animation: fadeUp 1.2s ease-out forwards;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            15% {
                opacity: 1;
                transform: translateY(0);
            }
            85% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        .content-center {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateY(40%);
        }

        .sphere {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, 
                rgba(30, 30, 45, 0.55) 0%,
                rgba(25, 25, 40, 0.65) 30%,
                rgba(20, 20, 35, 0.85) 60%,
                rgba(15, 15, 28, 0.95) 85%,
                rgba(10, 10, 20, 1) 100%);
            box-shadow: 
                0 5px 20px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(120, 100, 80, 0.4);
            pointer-events: none;
        }

        .sphere::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(200, 170, 120, 0.08) 0%,
                transparent 70%);
            pointer-events: none;
        }

        .spark-plug-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
            transition: transform 0.07s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .spark-plug {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.5));
            pointer-events: none;
        }

        .spark-plug-wrapper.tap-active {
            transform: scale(0.94);
        }

        .debris-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
            overflow: hidden;
        }

        .debris {
            position: absolute;
            width: 7px;
            height: 7px;
            background: white;
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0.95;
            animation: fragmentFly 0.6s ease-out forwards;
        }

        .debris.rounded {
            border-radius: 50%;
        }
        .debris.shard {
            border-radius: 1px;
            transform: rotate(45deg);
            width: 5px;
            height: 10px;
        }
        .debris.tiny {
            width: 4px;
            height: 4px;
        }

        @keyframes fragmentFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx, 60px), var(--dy, -70px)) scale(0.2) rotate(200deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .sphere {
                width: 260px;
                height: 260px;
            }
            .spark-plug-wrapper {
                max-width: 240px;
            }
            .content-center {
                transform: translateY(43%);
            }
            .stat-value {
                font-size: 1.2rem;
            }
            .stat-label {
                font-size: 0.65rem;
            }
            .stats-panel {
                padding: 10px 18px;
                top: 35px;
            }
            .floating-message-container {
                top: 105px;
            }
            .daily-bonus-btn {
                top: 115px;
                right: 12px;
                padding: 5px 12px;
            }
            .daily-bonus-icon {
                font-size: 1.2rem;
            }
            .daily-bonus-text {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats-panel">
        <div class="stat-item">
            <div class="stat-label">УРОВЕНЬ</div>
            <div class="stat-value" id="levelValue">1</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-label">ДЕТАЛЕЙ</div>
            <div class="stat-value" id="partsValue">0</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-label">ДОХОД/ЧАС</div>
            <div class="stat-value" id="incomeValue">0</div>
        </div>
    </div>

    <div class="daily-bonus-btn" id="dailyBonusBtn">
        <span class="daily-bonus-icon">🎁</span>
        <div>
            <div class="daily-bonus-text" id="dailyBonusText">ЕЖЕДНЕВНЫЙ БОНУС</div>
            <div class="daily-bonus-timer" id="dailyBonusTimer"></div>
        </div>
    </div>

    <div class="floating-message-container" id="messageContainer"></div>

    <div class="content-center">
        <div class="sphere"></div>
        <div class="spark-plug-wrapper" id="tapZone">
            <img src="IMG_0884-photo.png" alt="Свеча зажигания" class="spark-plug">
        </div>
    </div>
    <div class="debris-container" id="debrisContainer"></div>
</div>

<script>
    const tapZone = document.getElementById('tapZone');
    const debrisContainer = document.getElementById('debrisContainer');
    const messageContainer = document.getElementById('messageContainer');
    const dailyBonusBtn = document.getElementById('dailyBonusBtn');
    const dailyBonusText = document.getElementById('dailyBonusText');
    const dailyBonusTimer = document.getElementById('dailyBonusTimer');
    
    let parts = 0;
    let level = 1;
    let incomePerSecond = 0;
    
    let lastBonusTimestamp = 0;
    let bonusAvailable = true;
    
    const MAX_LEVEL = 30;
    
    const levelValueEl = document.getElementById('levelValue');
    const partsValueEl = document.getElementById('partsValue');
    const incomeValueEl = document.getElementById('incomeValue');
    
    // ФИКСИРОВАННЫЙ БОНУС 500
    function getBonusAmount() {
        return 500;
    }
    
    function formatTimeLeft(ms) {
        const hours = Math.floor(ms / (1000 * 60 * 60));
        const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((ms % (1000 * 60)) / 1000);
        if (hours > 0) return `${hours}ч ${minutes}м`;
        if (minutes > 0) return `${minutes}м ${seconds}с`;
        return `${seconds}с`;
    }
    
    function updateBonusUI() {
        const now = Date.now();
        const hours24 = 24 * 60 * 60 * 1000;
        
        if (lastBonusTimestamp === 0 || now - lastBonusTimestamp >= hours24) {
            bonusAvailable = true;
            dailyBonusBtn.classList.remove('disabled');
            dailyBonusText.innerText = 'ЕЖЕДНЕВНЫЙ БОНУС';
            dailyBonusTimer.innerText = `${getBonusAmount()} деталей!`;
        } else {
            bonusAvailable = false;
            dailyBonusBtn.classList.add('disabled');
            const timeLeft = hours24 - (now - lastBonusTimestamp);
            dailyBonusText.innerText = 'СЛЕДУЮЩИЙ БОНУС';
            dailyBonusTimer.innerText = formatTimeLeft(timeLeft);
        }
    }
    
    function claimBonus() {
        const now = Date.now();
        const hours24 = 24 * 60 * 60 * 1000;
        
        if (lastBonusTimestamp !== 0 && now - lastBonusTimestamp < hours24) {
            showFloatingMessage('❌ Бонус уже получен!', '#FF8888');
            return false;
        }
        
        const bonus = getBonusAmount();
        addParts(bonus);
        lastBonusTimestamp = now;
        saveGame();
        updateBonusUI();
        showFloatingMessage(`🎁 +${bonus} ДЕТАЛЕЙ!`, '#FFD966');
        return true;
    }
    
    function getRequiredForNextLevel(currentLevel) {
        if (currentLevel >= MAX_LEVEL) return Infinity;
        if (currentLevel === 1) return 1000;
        if (currentLevel === 2) return 5000;
        let required = 7000;
        for (let i = 4; i <= currentLevel; i++) {
            required += 2000;
        }
        return required;
    }
    
    function getTotalRequiredForLevel(targetLevel) {
        if (targetLevel <= 1) return 0;
        if (targetLevel > MAX_LEVEL) return Infinity;
        let total = 0;
        for (let lvl = 1; lvl < targetLevel; lvl++) {
            total += getRequiredForNextLevel(lvl);
        }
        return total;
    }
    
    function showFloatingMessage(text, color = '#FFD966') {
        const msg = document.createElement('div');
        msg.className = 'floating-message';
        msg.innerText = text;
        msg.style.color = color;
        msg.style.borderColor = color + '80';
        messageContainer.appendChild(msg);
        setTimeout(() => msg.remove(), 1200);
    }
    
    function checkLevelUp() {
        if (level >= MAX_LEVEL) return;
        
        let newLevel = level;
        while (newLevel < MAX_LEVEL) {
            const totalForNext = getTotalRequiredForLevel(newLevel + 1);
            if (parts >= totalForNext) {
                newLevel++;
            } else {
                break;
            }
        }
        
        if (newLevel > level) {
            level = newLevel;
            updateUI();
            showFloatingMessage(`⬆️ УРОВЕНЬ ${level}!`, '#FFAA44');
            
            if (level === MAX_LEVEL) {
                showFloatingMessage(`🏆 МАКСИМАЛЬНЫЙ УРОВЕНЬ!`, '#FFAA44');
            }
            saveGame();
        }
    }
    
    function updateUI() {
        partsValueEl.innerText = Math.floor(parts);
        levelValueEl.innerText = level;
        const incomePerHour = Math.floor(incomePerSecond * 3600);
        incomeValueEl.innerText = incomePerHour.toLocaleString();
        updateBonusUI();
    }
    
    function addParts(amount) {
        parts += amount;
        updateUI();
        checkLevelUp();
        saveGame();
    }
    
    function createDebris(x, y) {
        const debrisCount = Math.floor(Math.random() * 3) + 1;
        for (let i = 0; i < debrisCount; i++) {
            const debris = document.createElement('div');
            debris.classList.add('debris');
            const shape = Math.random();
            if (shape < 0.33) debris.classList.add('rounded');
            else if (shape < 0.66) debris.classList.add('shard');
            else debris.classList.add('tiny');
            
            const angle = (Math.random() - 0.5) * Math.PI * 1.5 - Math.PI / 3;
            const speed = 55 + Math.random() * 70;
            const dx = Math.cos(angle) * speed * (Math.random() * 0.8 + 0.6);
            const dy = Math.sin(angle) * speed * 0.9 - 40;
            
            debris.style.setProperty('--dx', dx + 'px');
            debris.style.setProperty('--dy', dy + 'px');
            debris.style.left = (x - 7 + (Math.random() - 0.5) * 26) + 'px';
            debris.style.top = (y - 7 + (Math.random() - 0.5) * 22) + 'px';
            
            const brightness = 200 + Math.random() * 55;
            debris.style.backgroundColor = `rgb(${brightness}, ${brightness - 15}, 230)`;
            
            debrisContainer.appendChild(debris);
            setTimeout(() => debris.remove(), 600);
        }
    }
    
    function animateTap() {
        tapZone.classList.add('tap-active');
        setTimeout(() => tapZone.classList.remove('tap-active'), 100);
        if (window.navigator && window.navigator.vibrate) navigator.vibrate(15);
    }
    
    function handleTap(clientX, clientY) {
        animateTap();
        addParts(1);
        createDebris(clientX, clientY);
        
        const spark = document.createElement('div');
        spark.innerHTML = '⚡';
        spark.style.position = 'fixed';
        spark.style.left = (clientX - 8) + 'px';
        spark.style.top = (clientY - 8) + 'px';
        spark.style.fontSize = '0.9rem';
        spark.style.opacity = '0.5';
        spark.style.pointerEvents = 'none';
        spark.style.zIndex = '1000';
        spark.style.transition = 'all 0.2s ease';
        document.body.appendChild(spark);
        setTimeout(() => {
            spark.style.transform = 'translateY(-15px)';
            spark.style.opacity = '0';
        }, 10);
        setTimeout(() => spark.remove(), 200);
    }
    
    tapZone.addEventListener('click', (e) => handleTap(e.clientX, e.clientY));
    tapZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.touches.length; i++) {
            handleTap(e.touches[i].clientX, e.touches[i].clientY);
        }
    });
    
    dailyBonusBtn.addEventListener('click', () => claimBonus());
    
    function saveGame() {
        const save = { parts, level, incomePerSecond, lastBonusTimestamp };
        localStorage.setItem('MotoTapSave', JSON.stringify(save));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('MotoTapSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                parts = data.parts || 0;
                level = data.level || 1;
                if (level > MAX_LEVEL) level = MAX_LEVEL;
                incomePerSecond = data.incomePerSecond || 0;
                lastBonusTimestamp = data.lastBonusTimestamp || 0;
                updateUI();
            } catch(e) {}
        }
        updateUI();
    }
    
    setInterval(() => updateBonusUI(), 1000);
    setInterval(() => saveGame(), 5000);
    
    setInterval(() => {
        if (incomePerSecond > 0) {
            addParts(incomePerSecond);
        }
    }, 1000);
    
    loadGame();
</script>
</body>
</html>
