<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MotoTap — Гараж</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            width: 100%;
            min-height: 100vh;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .game-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-image: url('copy_4432001B-F045-479C-A4B1-7135B9218A73.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 30px 20px 50px;
        }
        .counter-area {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 80px;
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.4);
        }
        .gear-icon { font-size: 2.8rem; }
        .counter-number {
            font-size: 3rem;
            font-weight: bold;
            color: #FFD966;
            text-shadow: 0 2px 0 #7a5c00;
        }
        .bike-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .bike-tap {
            cursor: pointer;
            transition: transform 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: inline-block;
            max-width: 85%;
        }
        .bike-tap:active { transform: scale(0.92); }
        .bike-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.6));
        }
        .bottom-panel {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }
        .future-button {
            background: #f0a500;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            text-align: center;
            flex: 1;
            color: #1f2a0e;
        }
        .error-message {
            background: rgba(0,0,0,0.8);
            color: #ff8888;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        @media (max-width: 600px) {
            .counter-number { font-size: 2.2rem; }
            .bike-image { max-width: 280px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="content">
        <div class="counter-area">
            <span class="gear-icon">⚙️</span>
            <div class="counter-number" id="partsCounter">0</div>
            <div style="font-size:0.7rem;">деталей</div>
        </div>

        <div class="bike-wrapper">
            <div class="bike-tap" id="tapZone">
                <img class="bike-image" id="bikeImg" alt="Мотоцикл">
            </div>
        </div>

        <div class="bottom-panel">
            <div class="future-button">🏪 МАГАЗИН (скоро)</div>
            <div class="future-button">🏆 НАГРАДЫ (скоро)</div>
        </div>
        <div id="errorMsg" class="error-message" style="display:none;"></div>
    </div>
</div>

<script>
    let parts = 0;
    const partsCounter = document.getElementById('partsCounter');
    const tapZone = document.getElementById('tapZone');
    const bikeImg = document.getElementById('bikeImg');
    const errorMsg = document.getElementById('errorMsg');

    // ПЫТАЕМСЯ ЗАГРУЗИТЬ МОТОЦИКЛ — СПИСОК ВОЗМОЖНЫХ ИМЁН
    const possibleNames = [
        'IMG_0877-no-bg-preview-carve.photos.png',
        'IMG_0877-no-bg-preview-carve.photos.PNG',
        'IMG_0877-no-bg-preview-carve.photos.png.png', // на всякий случай
        'IMG_0877-no-bg-preview-carve.photos.jpg',
        'IMG_0877-no-bg-preview-carve.photos.jpeg',
        'motorbike.png',
        'bike.png',
        'moto.png'
    ];
    
    let imageLoaded = false;
    
    function tryLoadImage(index) {
        if (index >= possibleNames.length) {
            // ничего не загрузилось — показываем ошибку и эмодзи вместо мотоцикла
            bikeImg.style.display = 'none';
            tapZone.innerHTML = '<div style="font-size: 5rem; text-align: center;">🏍️<br><span style="font-size:1rem;">(картинка не найдена)</span><br><span style="font-size:0.7rem;">проверь имя файла</span></div>';
            errorMsg.style.display = 'block';
            errorMsg.innerHTML = '⚠️ Файл мотоцикла не загрузился!<br>Ожидаемые имена: ' + possibleNames.join(', ') + '<br><br>👉 Переименуй свой PNG в: <b>IMG_0877-no-bg-preview-carve.photos.png</b>';
            return;
        }
        
        const img = new Image();
        img.onload = function() {
            // Картинка загрузилась!
            bikeImg.src = possibleNames[index];
            bikeImg.style.display = 'block';
            imageLoaded = true;
            errorMsg.style.display = 'none';
            console.log('✅ Загружено:', possibleNames[index]);
        };
        img.onerror = function() {
            // пробуем следующее имя
            tryLoadImage(index + 1);
        };
        img.src = possibleNames[index];
    }
    
    // Запускаем поиск картинки
    tryLoadImage(0);
    
    function updateUI() {
        partsCounter.innerText = Math.floor(parts);
        saveGame();
    }
    
    function addParts(amount) {
        parts += amount;
        updateUI();
    }
    
    function animateTap() {
        tapZone.style.transform = 'scale(0.92)';
        setTimeout(() => { tapZone.style.transform = 'scale(1)'; }, 100);
        if (window.navigator && window.navigator.vibrate) navigator.vibrate(20);
    }
    
    function createFloatingNumber(x, y) {
        const div = document.createElement('div');
        div.innerText = '+1 ⚙️';
        div.style.position = 'fixed';
        div.style.left = (x - 20) + 'px';
        div.style.top = (y - 30) + 'px';
        div.style.color = '#FFD966';
        div.style.fontSize = '1.8rem';
        div.style.fontWeight = 'bold';
        div.style.textShadow = '1px 1px 0 black';
        div.style.pointerEvents = 'none';
        div.style.zIndex = '9999';
        div.style.transition = 'all 0.5s ease-out';
        document.body.appendChild(div);
        setTimeout(() => { div.style.transform = 'translateY(-60px)'; div.style.opacity = '0'; }, 20);
        setTimeout(() => div.remove(), 600);
    }
    
    function onTap(event) {
        animateTap();
        addParts(1);
        let clientX = event.clientX;
        let clientY = event.clientY;
        if (event.touches) {
            clientX = event.touches[0].clientX;
            clientY = event.touches[0].clientY;
        }
        createFloatingNumber(clientX, clientY);
    }
    
    tapZone.addEventListener('click', onTap);
    tapZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        onTap(e);
    });
    
    function saveGame() {
        localStorage.setItem('MotoTapSave', JSON.stringify({ parts: parts }));
    }
    function loadGame() {
        const saved = localStorage.getItem('MotoTapSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.parts !== undefined) parts = data.parts;
                updateUI();
            } catch(e) {}
        }
    }
    loadGame();
</script>
</body>
</html>
