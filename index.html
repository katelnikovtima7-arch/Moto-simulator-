<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MotoTap — Свеча зажигания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
            position: fixed;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('IMG_0881.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        .content-center {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateY(32%);
        }

        .sphere {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, 
                rgba(30, 30, 45, 0.55) 0%,
                rgba(25, 25, 40, 0.65) 30%,
                rgba(20, 20, 35, 0.85) 60%,
                rgba(15, 15, 28, 0.95) 85%,
                rgba(10, 10, 20, 1) 100%);
            box-shadow: 
                0 5px 20px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(120, 100, 80, 0.4);
            pointer-events: none;
        }

        .sphere::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(200, 170, 120, 0.08) 0%,
                transparent 70%);
            pointer-events: none;
        }

        .spark-plug-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
            transition: transform 0.07s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .spark-plug {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.5));
            pointer-events: none;
        }

        .spark-plug-wrapper.tap-active {
            transform: scale(0.94);
        }

        .debris-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
            overflow: hidden;
        }

        .debris {
            position: absolute;
            width: 7px;
            height: 7px;
            background: white;
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0.95;
            animation: fragmentFly 0.6s ease-out forwards;
        }

        .debris.rounded {
            border-radius: 50%;
        }
        .debris.shard {
            border-radius: 1px;
            transform: rotate(45deg);
            width: 5px;
            height: 10px;
        }
        .debris.tiny {
            width: 4px;
            height: 4px;
        }

        @keyframes fragmentFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx, 60px), var(--dy, -70px)) scale(0.2) rotate(200deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .sphere {
                width: 260px;
                height: 260px;
            }
            .spark-plug-wrapper {
                max-width: 240px;
            }
            .content-center {
                transform: translateY(35%);
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="content-center">
        <div class="sphere"></div>
        <div class="spark-plug-wrapper" id="tapZone">
            <img src="IMG_0884-photo.png" alt="Свеча зажигания" class="spark-plug">
        </div>
    </div>
    <div class="debris-container" id="debrisContainer"></div>
</div>

<script>
    const tapZone = document.getElementById('tapZone');
    const debrisContainer = document.getElementById('debrisContainer');
    
    let tapCount = 0;
    
    function createDebris(x, y) {
        const debrisCount = Math.floor(Math.random() * 3) + 1;
        
        for (let i = 0; i < debrisCount; i++) {
            const debris = document.createElement('div');
            debris.classList.add('debris');
            
            const shape = Math.random();
            if (shape < 0.33) debris.classList.add('rounded');
            else if (shape < 0.66) debris.classList.add('shard');
            else debris.classList.add('tiny');
            
            const angle = (Math.random() - 0.5) * Math.PI * 1.5 - Math.PI / 3;
            const speed = 55 + Math.random() * 70;
            const dx = Math.cos(angle) * speed * (Math.random() * 0.8 + 0.6);
            const dy = Math.sin(angle) * speed * 0.9 - 40;
            
            debris.style.setProperty('--dx', dx + 'px');
            debris.style.setProperty('--dy', dy + 'px');
            debris.style.left = (x - 7 + (Math.random() - 0.5) * 26) + 'px';
            debris.style.top = (y - 7 + (Math.random() - 0.5) * 22) + 'px';
            
            const brightness = 200 + Math.random() * 55;
            debris.style.backgroundColor = `rgb(${brightness}, ${brightness - 15}, 230)`;
            
            debrisContainer.appendChild(debris);
            setTimeout(() => debris.remove(), 600);
        }
    }
    
    function animateTap() {
        tapZone.classList.add('tap-active');
        setTimeout(() => {
            tapZone.classList.remove('tap-active');
        }, 100);
        if (window.navigator && window.navigator.vibrate) navigator.vibrate(15);
    }
    
    function handleTap(clientX, clientY) {
        animateTap();
        createDebris(clientX, clientY);
        
        const spark = document.createElement('div');
        spark.innerHTML = '⚡';
        spark.style.position = 'fixed';
        spark.style.left = (clientX - 8) + 'px';
        spark.style.top = (clientY - 8) + 'px';
        spark.style.fontSize = '0.9rem';
        spark.style.opacity = '0.5';
        spark.style.pointerEvents = 'none';
        spark.style.zIndex = '1000';
        spark.style.transition = 'all 0.2s ease';
        document.body.appendChild(spark);
        setTimeout(() => { spark.style.transform = 'translateY(-15px)'; spark.style.opacity = '0'; }, 10);
        setTimeout(() => spark.remove(), 200);
        
        tapCount++;
        console.log('Тапов:', tapCount);
    }
    
    tapZone.addEventListener('click', (e) => {
        handleTap(e.clientX, e.clientY);
    });
    
    tapZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touches = e.touches;
        for (let i = 0; i < touches.length; i++) {
            const touch = touches[i];
            handleTap(touch.clientX, touch.clientY);
        }
    });
    
    console.log('✅ Положение вернул к тому, которое тебе нравилось');
</script>
</body>
</html>
